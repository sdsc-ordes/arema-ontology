name: Generate Public Ontology Docs

on:
  push:
    paths:
      - 'src/ontology/arema-ontology.ttl'
      - '.github/workflows/docs.yml'
      - 'vendir.yml'

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
    
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install vendir
        run: |
          curl -L https://carvel.dev/install.sh | bash

      - name: Sync Skohub Vocabs
        run: cd external && vendir sync -f vendir.yml && cd ..

      - name: Prepare clean public and data directories
        run: |
          rm -rf public docs/public
          # mkdir -p public 
          echo "BASEURL=/$(basename $GITHUB_REPOSITORY)" > .env

      - name: Run Skohub Vocabs (local checkout)
        run: |
          # Build the container
          docker build -t skohub-vocabs ./external/skohub-vocabs
          
          rm -rf docs/*

          # Run the container, mount only data and tools
          docker run --rm \
            -v ./src/ontology:/app/data:ro \
            -v ./docs:/public:rw \
            -v ./tools/skohub-vocabs:/custom-assets \
            skohub-vocabs 

      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "Update docs via skohub-vocabs"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
