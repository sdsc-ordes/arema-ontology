name: Generate Public Ontology Docs

on:
  push:
    paths:
      - 'src/ontology/arema-ontology.ttl'
      - '.github/workflows/docs.yml'
      - 'vendir.yml'

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
    
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install vendir
        run: |
          curl -L https://carvel.dev/install.sh | bash

      - name: Sync Skohub Vocabs
        run: cd external && vendir sync -f vendir.yml && cd ..

      - name: Prepare clean public and data directories
        run: |
          rm -rf public data docs/public
          mkdir -p public data
          cp src/ontology/arema-ontology.ttl data/
          echo "BASEURL=/$(basename $GITHUB_REPOSITORY)" > .env

      - name: Run Skohub Vocabs (local checkout)
        run: |
          # Build the container
          docker build -t skohub-vocabs ./external/skohub-vocabs

          # Run the container, mount only what is needed (ontology data and tools)
          CONTAINER_ID=$(docker create \
            -v ${{ github.workspace }}/src/ontology:/app/data \
            -v ${{ github.workspace }}/tools:/app/tools \
            skohub-vocabs)

          # Copy in overrides
          docker start -a $CONTAINER_ID sh -c "
            cp -r /app/tools/skohub-vocabs/src/* /app/src/ && \
            cp -r /app/tools/skohub-vocabs/static/* /app/static/ && \
            cp /app/tools/config.yaml /app/config.yaml
          "

          # Copy output from container to host
          docker cp $CONTAINER_ID:/app/public ./public

          # Clean up container
          docker rm $CONTAINER_ID

          # Copy into docs
          rm -rf docs/*
          cp -r public/* docs/


      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "Update docs via skohub-vocabs"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
