name: Generate Public Ontology Docs

on:
  push:
    paths:
      - 'src/ontology/arema-ontology.ttl'
      - '.github/workflows/docs.yml'
      - 'vendir.yml'

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
    
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install vendir
        run: |
          curl -L https://carvel.dev/install.sh | bash

      - name: Sync Skohub Vocabs
        run: cd external && vendir sync -f vendir.yml && cd ..

      - name: Prepare clean public and data directories
        run: |
          rm -rf public docs/public
          # mkdir -p public 
          echo "BASEURL=/$(basename $GITHUB_REPOSITORY)" > .env

      # - name: Run Skohub Vocabs (local checkout)
      #   run: |
      #     set -x
      #     docker build -t skohub-vocabs ./external/skohub-vocabs
      #     rm -rf docs/*
      #     mkdir -p docs
      #     echo "Docs contents before build:"
      #     ls -l docs
      #     sudo chown -R 1000:1000 docs
      #     docker run --rm \
      #       -v ./src/ontology:/app/data:ro \
      #       -v ./docs:/app/public:rw \
      #       -v ./tools/skohub-vocabs:/custom-assets \
      #       skohub-vocabs
      #     echo "Docs contents after build:"
      #     ls -l docs
      #     find . -type f -name "*.html" | head -n 50

      - name: Run Skohub Vocabs Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/public:/app/public \
            -v ${{ github.workspace }}/data:/app/data \
            -v ${{ github.workspace }}/.env:/app/.env \
            skohub/skohub-vocabs-docker:latest
          rm -rf docs/*
          cp -r public/* docs/
          
      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "Update docs via skohub-vocabs"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
